apiVersion: v1
kind: Namespace
metadata:
  name: bk-lite-alerts
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-event-exporter
  namespace: bk-lite-alerts
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bk-lite-k8s-event-exporter
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bk-lite-k8s-event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bk-lite-k8s-event-exporter
subjects:
  - kind: ServiceAccount
    name: kubernetes-event-exporter
    namespace: bk-lite-alerts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bk-lite-k8s-event-exporter-config
  namespace: bk-lite-alerts
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    maxEventAgeSeconds: 60
    omitLookup: true
    route:
      routes:
        - match:
            - receiver: "bk-lite-alert-center"
          drop:
            - type: "Normal"
    receivers:
      - name: "bk-lite-alert-center"
        webhook:
          endpoint: "${BK_LITE_RECEIVER_URL}"
          headers:
            SECRET: "${BK_LITE_SECRET}"
          layout:
            source_id: "${BK_LITE_SOURCE_ID}"
            events:
              - title: "K8s {{ .Type }} {{ .Reason }} on {{ .InvolvedObject.Kind }}/{{ .Namespace }}/{{ .InvolvedObject.Name }}"
                description: "{{ .Message }}"
                level: '{{ if eq .Type "Warning" }}2{{ else }}3{{ end }}'
                item: "{{ .Reason }}"
                start_time: "{{ .GetTimestampMs }}"
                external_id: "{{ .UID }}"
                push_source_id: "${BK_LITE_PUSH_SOURCE_ID}"
                resource_id: "{{ .InvolvedObject.UID }}"
                resource_name: "{{ .InvolvedObject.Name }}"
                resource_type: '{{ if eq .InvolvedObject.Kind "Namespace" }}k8s_namespace{{ else if eq .InvolvedObject.Kind "Node" }}k8s_node{{ else if eq .InvolvedObject.Kind "Pod" }}k8s_pod{{ else if or (eq .InvolvedObject.Kind "Deployment") (eq .InvolvedObject.Kind "StatefulSet") (eq .InvolvedObject.Kind "DaemonSet") (eq .InvolvedObject.Kind "ReplicaSet") (eq .InvolvedObject.Kind "Job") (eq .InvolvedObject.Kind "CronJob") }}k8s_workload{{ else }}{{ .InvolvedObject.Kind }}{{ end }}'
                service: "kubernetes"
                location: "${CLUSTER_NAME}"
                action: "created"
                tags:
                  cluster: "${CLUSTER_NAME}"
                  namespace: "{{ .Namespace }}"
                  kind: "{{ .InvolvedObject.Kind }}"
                  reason: "{{ .Reason }}"
                  type: "{{ .Type }}"
                labels:
                  cluster_name: "${CLUSTER_NAME}"
                  namespace: "{{ .Namespace }}"
                  reason: "{{ .Reason }}"
                  type: "{{ .Type }}"
                  count: "{{ .Count }}"
                  kind: "{{ .InvolvedObject.Kind }}"
                  name: "{{ .InvolvedObject.Name }}"
                  uid: "{{ .UID }}"
                  involved_object_uid: "{{ .InvolvedObject.UID }}"
                  api_version: "{{ .InvolvedObject.APIVersion }}"
                  component: "{{ .Source.Component }}"
                  host: "{{ .Source.Host }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-event-exporter
  namespace: bk-lite-alerts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-event-exporter
  template:
    metadata:
      labels:
        app: kubernetes-event-exporter
    spec:
      serviceAccountName: kubernetes-event-exporter
      containers:
        - name: kubernetes-event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - -conf=/data/config.yaml
          envFrom:
            - secretRef:
                name: bk-lite-k8s-event-exporter-secret
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /data
              name: config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: bk-lite-k8s-event-exporter-config
