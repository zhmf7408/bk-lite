collect_type:
  Auditbeat:
    auditd:
      description: 采集 Linux 审计框架日志，用于全面的系统安全监控与合规审计。
      name: 审计日志采集
    file_integrity:
      name: 文件完整性监控
      description: 监控文件系统变化，检测未经授权的修改，确保数据完整性。
  Vector:
    syslog:
      name: 系统日志
      description: 采集 syslog 消息，用于集中式日志记录和监控。
    kubernetes:
      name: Kubernetes 集群
      description: 从 Kubernetes 集群采集日志和指标，用于监控和分析。
    exec:
      name: 命令执行
      description: 执行命令从各种来源采集日志数据，用于处理和分析。
    docker:
      description: 从 Docker 容器采集和处理日志，用于集中式日志记录和分析。
      name: Docker 日志
    file:
      description: 从文件采集日志数据，用于集中式日志记录和分析。
      name: 文件采集
  Packetbeat:
    http:
      description: 监控 HTTP 流量，分析 Web 应用程序性能并检测异常。
      name: HTTP 协议
    dhcp:
      name: DHCP 协议
      description: 采集 DHCP 流量，监控 IP 地址分配和网络配置。
    dns:
      name: DNS 协议
      description: 捕获 DNS 查询和响应数据，用于网络故障排查和安全分析。
    flows:
      description: 分析网络流量数据，监控流量模式并检测潜在的安全威胁。
      name: 网络流量
    icmp:
      name: ICMP 协议
      description: 监控 ICMP 流量，用于网络诊断和性能分析。
  Snmptrapd:
    snmp_trap:
      name: SNMP Trap
      description: 采集 SNMP trap 消息，用于网络设备监控和告警。
  Filebeat:
    filestream:
      name: 文件流采集
      description: 从各种来源采集和转发日志数据，用于集中式日志记录和分析。
    apache:
      name: Apache 日志
      description: 使用 Filebeat 模块采集并解析 Apache HTTP 服务器访问日志和错误日志。
    elasticsearch:
      name: Elasticsearch 日志
      description: 使用 Filebeat 模块采集并解析 Elasticsearch 服务日志、审计日志、慢日志、弃用日志和 GC 日志。
    mysql:
      name: MySQL 日志
      description: 使用 Filebeat 模块采集并解析 MySQL 慢日志和错误日志。
    kafka:
      name: Kafka 日志
      description: 使用 Filebeat 模块采集并解析 Kafka 日志文件。
    nginx:
      name: Nginx 日志
      description: 使用 Filebeat 模块采集并解析 Nginx 访问日志和错误日志。
    mongodb:
      name: MongoDB 日志
      description: 使用 Filebeat 模块采集并解析 MongoDB 日志。
    rabbitmq:
      name: RabbitMQ 日志
      description: 使用 Filebeat 模块采集并解析 RabbitMQ 日志文件。
    redis:
      name: Redis 日志
      description: 使用 Filebeat 模块采集并解析 Redis 日志和慢日志。
    postgresql:
      name: PostgreSQL 日志
      description: 使用 Filebeat 模块采集并解析 PostgreSQL 日志。
  Winlogbeat:
    winlogbeat:
      name: Windows 事件日志
      description: 采集 Windows 事件日志，包括安全、系统、应用程序、Sysmon、PowerShell、Defender 和计划任务等日志。

display_category:
  general:
    name: 通用
    description: 通用文件流、系统日志等基础采集
  k8s:
    name: K8s
    description: Kubernetes 集群日志采集
  database:
    name: 数据库
    description: 关系型数据库、NoSQL、缓存等数据存储系统日志
  middleware:
    name: 中间件
    description: Web服务器、消息队列、应用服务器日志
  network:
    name: 网络
    description: 网络协议流量分析、连接监控
  container:
    name: 容器
    description: 容器运行时日志采集
  security:
    name: 安全与审计
    description: 系统审计、文件完整性、安全事件监控
