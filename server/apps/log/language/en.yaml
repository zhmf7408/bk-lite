collect_type:
  Auditbeat:
    auditd:
      description: Collects Linux audit framework logs for comprehensive system security
        monitoring and compliance.
      name: Auditd
    file_integrity:
      name: File Integrity
      description: Monitors file system changes to detect unauthorized modifications
        and ensure data integrity.
  Vector:
    syslog:
      name: Syslog
      description: Collects syslog messages for centralized logging and monitoring
    kubernetes:
      name: Kubernetes
      description: Collects logs and metrics from Kubernetes clusters for monitoring
        and analysis.
    exec:
      name: Exec
      description: Executes commands to collect log data from various sources for
        processing and analysis.
    docker:
      description: Collects and processes logs from Docker containers for centralized
        logging and analysis.
      name: Docker
    file:
      description: Collects log data from files for centralized logging and analysis.
      name: File
  Packetbeat:
    http:
      description: Monitors HTTP traffic to analyze web application performance and
        detect anomalies.
      name: HTTP
    dhcp:
      name: DHCP
      description: Collects DHCP traffic to monitor IP address allocation and network
        configuration.
    dns:
      name: DNS
      description: Captures DNS query and response data for network troubleshooting
        and security analysis.
    flows:
      description: Analyzes network flow data to monitor traffic patterns and detect
        potential security threats.
      name: Flows
    icmp:
      name: ICMP
      description: Monitors ICMP traffic for network diagnostics and performance analysis.
  Snmptrapd:
    snmp_trap:
      name: SNMP Trap
      description: Collects SNMP Trap messages from network devices.
  Filebeat:
    filestream:
      name: Filestream
      description: Collects and forwards log data from various sources for centralized
        logging and analysis.
    apache:
      name: Apache
      description: Collects and parses Apache HTTP server access and error logs using Filebeat module.
    elasticsearch:
      name: Elasticsearch
      description: Collects and parses Elasticsearch server, audit, slowlog, deprecation and GC logs using Filebeat module.
    mysql:
      name: MySQL
      description: Collects and parses MySQL slow logs and error logs using Filebeat module.
    kafka:
      name: Kafka
      description: Collects and parses Kafka log files using Filebeat module.
    nginx:
      name: Nginx
      description: Collects and parses Nginx access and error logs using Filebeat module.
    mongodb:
      name: MongoDB
      description: Collects and parses MongoDB logs using Filebeat module.
    rabbitmq:
      name: RabbitMQ
      description: Collects and parses RabbitMQ log files using Filebeat module.
    redis:
      name: Redis
      description: Collects and parses Redis logs and slowlogs using Filebeat module.
    postgresql:
      name: PostgreSQL
      description: Collects and parses PostgreSQL logs using Filebeat module.
  Winlogbeat:
    winlogbeat:
      name: Windows Event Logs
      description: Collects Windows event logs including Security, System, Application, Sysmon, PowerShell, Defender and Task Scheduler logs.

display_category:
  general:
    name: General
    description: General file stream, syslog and basic collection
  k8s:
    name: K8s
    description: Kubernetes cluster log collection
  database:
    name: Database
    description: RDBMS, NoSQL, cache and data storage system logs
  middleware:
    name: Middleware
    description: Web servers, message queues, application servers logs
  network:
    name: Network
    description: Network protocol analysis and connection monitoring
  container:
    name: Container
    description: Container runtime log collection
  security:
    name: Security & Audit
    description: System audit, file integrity, security event monitoring
