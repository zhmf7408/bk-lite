<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsPilot - 智能体</title>
    <style>
        :root {
            --color-primary: #2b5bff;
            --color-primary-2: #3f79ff;
            --color-text-1: #1f2d3d;
            --color-text-2: #4f5f75;
            --color-text-3: #8c9bb0;
            --color-border: #dfe6ef;
            --color-fill: #f4f7fc;
            --color-page-bg: #f2f5fb;
            --shadow-card: 0 6px 16px rgba(20, 38, 70, 0.08);
            --shadow-hover: 0 10px 20px rgba(20, 38, 70, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--color-text-1);
            background: var(--color-page-bg);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            position: sticky;
            top: 0;
            z-index: 10;
            height: 56px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e5ebf4;
            background: #edf3fb;
        }

        .brand {
            min-width: 230px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #5a6880;
        }

        .brand img {
            width: 22px;
            height: 22px;
        }

        .brand .switcher {
            margin-left: 4px;
            border: 1px solid var(--color-border);
            color: #6f7f95;
            background: #f7faff;
            border-radius: 8px;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .main-nav {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .main-nav a {
            height: 34px;
            padding: 0 12px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #4f5e73;
            font-size: 13px;
            font-weight: 500;
        }

        .main-nav a:hover {
            background: #e7eef8;
        }

        .main-nav a.active {
            color: var(--color-primary);
            background: #e5efff;
            font-weight: 600;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.75;
        }

        .header-actions {
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            color: #6f7f95;
            font-size: 13px;
        }

        .icon-action {
            border: none;
            background: transparent;
            color: inherit;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .icon-action:hover {
            background: #e3eaf5;
        }

        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .workspace {
            padding: 8px 10px 14px;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 8px;
        }

        .filter-select,
        .search-input {
            height: 30px;
            border: 1px solid var(--color-border);
            border-radius: 5px;
            background: #fff;
            color: #6c7b90;
            font-size: 12px;
            padding: 0 9px;
            outline: none;
        }

        .filter-select {
            width: 132px;
        }

        .search-input {
            width: 168px;
        }

        .search-button {
            width: 34px;
            border: none;
            border-radius: 5px;
            background: var(--color-primary);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
        }

        .create-card,
        .skill-card {
            border: 1px solid #d8e0ec;
            border-radius: 10px;
            background: #fff;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all 0.18s ease;
        }

        .create-card:hover,
        .skill-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
            border-color: #c7d4e6;
        }

        .create-card {
            min-height: 136px;
            padding: 20px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .create-action {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #4f5f75;
            cursor: pointer;
        }

        .create-action:hover {
            color: var(--color-primary);
        }

        .create-icon {
            width: 16px;
            text-align: center;
            color: #3f4f66;
            font-size: 14px;
            line-height: 1;
        }

        .skill-card {
            position: relative;
            min-height: 136px;
            cursor: pointer;
        }

        .card-banner {
            position: relative;
            height: 34px;
            background: linear-gradient(110deg, #cfd9ef 0%, #bac9e7 45%, #9bb3e2 100%);
            border-bottom: 1px solid rgba(205, 215, 232, 0.95);
        }

        .banner-strong {
            background: linear-gradient(110deg, #4249e7 0%, #0b92ff 100%);
        }

        .pin-btn {
            position: absolute;
            left: 8px;
            top: 8px;
            width: 14px;
            height: 14px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.28);
            color: #fff;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        .pin-btn.active {
            opacity: 1;
            background: rgba(38, 70, 130, 0.45);
        }

        .menu-wrap {
            position: absolute;
            right: 7px;
            top: 6px;
            z-index: 3;
        }

        .menu-btn {
            width: 18px;
            height: 18px;
            border: none;
            border-radius: 4px;
            color: #3b4f6f;
            background: transparent;
            font-size: 15px;
            line-height: 1;
            padding: 0;
        }

        .menu-btn:hover {
            background: #edf3ff;
            color: #2b5bff;
        }

        .dropdown {
            position: absolute;
            top: 24px;
            right: 0;
            min-width: 74px;
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 10px 20px rgba(20, 38, 70, 0.18);
            display: none;
            z-index: 6;
        }

        .dropdown.open {
            display: block;
        }

        .dropdown button {
            width: 100%;
            height: 28px;
            border: none;
            background: transparent;
            text-align: left;
            padding: 0 10px;
            border-radius: 6px;
            color: #2f405a;
            font-size: 13px;
        }

        .dropdown button:hover {
            background: #edf3ff;
            color: #2b5bff;
        }

        .avatar-badge {
            position: absolute;
            top: 18px;
            right: 46px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f08a25;
            color: #1f2d3d;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(32, 42, 62, 0.15);
        }

        .avatar-badge.robot {
            background: #f3f7ff;
            color: #2d63ff;
        }

        .card-body {
            padding: 12px 10px 10px;
        }

        .card-title {
            margin: 0;
            font-size: 12px;
            line-height: 1.25;
            font-weight: 700;
            color: #1f2d3d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            margin: 6px 0 0;
            font-size: 11px;
            color: #7f90a8;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tag-row {
            margin-top: 9px;
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tag {
            height: 16px;
            padding: 0 4px;
            border-radius: 3px;
            border: 1px solid;
            font-size: 9px;
            line-height: 14px;
            white-space: nowrap;
        }

        .tag-model {
            border-color: #8bb5ff;
            color: #2d6fff;
            background: #edf4ff;
        }

        .tag-skill {
            border-color: #cba9ff;
            color: #7d56cc;
            background: #f6f0ff;
        }

        .card-footer {
            margin-top: 8px;
            text-align: right;
            font-size: 10px;
            color: #9aa8bc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            display: none;
            min-height: 220px;
            border: 1px dashed #c6d3e5;
            border-radius: 10px;
            background: #f9fbff;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #7f90a8;
            font-size: 13px;
        }

        .empty-state strong {
            margin-bottom: 6px;
            color: #4d5e75;
            font-size: 15px;
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(14, 25, 43, 0.34);
            z-index: 20;
            padding: 16px;
        }

        .modal-mask.open {
            display: flex;
        }

        .modal {
            width: 900px;
            max-width: 100%;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 14px;
            max-height: calc(100vh - 36px);
            overflow: auto;
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: #eef3fb;
            color: #4f5f75;
            font-size: 16px;
        }

        .template-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .template-tab {
            height: 30px;
            border: 1px solid var(--color-border);
            background: #fff;
            border-radius: 8px;
            padding: 0 10px;
            color: #5c6d84;
            font-size: 12px;
        }

        .template-tab.active {
            border-color: #c5d8ff;
            background: #eaf1ff;
            color: var(--color-primary);
            font-weight: 600;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .template-card {
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 10px;
        }

        .template-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #edf4ff;
            color: var(--color-primary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .template-card strong {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .template-card p {
            margin: 0 0 10px;
            font-size: 12px;
            color: #73859d;
            line-height: 1.45;
        }

        .primary-button {
            height: 30px;
            border: none;
            border-radius: 8px;
            padding: 0 12px;
            color: #fff;
            background: var(--color-primary);
            font-size: 12px;
            font-weight: 600;
        }

        .toast-wrap {
            position: fixed;
            right: 14px;
            bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 24;
        }

        .toast {
            min-width: 180px;
            max-width: 360px;
            padding: 10px 12px;
            background: rgba(18, 31, 50, 0.93);
            color: #fff;
            border-radius: 8px;
            font-size: 12px;
            box-shadow: 0 10px 26px rgba(12, 24, 44, 0.25);
            animation: fade-in 0.2s ease;
        }

        @media (max-width: 1400px) {
            .card-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (max-width: 1140px) {
            .top-header {
                height: auto;
                padding: 8px 10px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .brand,
            .header-actions {
                min-width: auto;
            }

            .main-nav {
                order: 3;
                width: 100%;
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 4px;
            }

            .card-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 780px) {
            .toolbar {
                justify-content: stretch;
                flex-wrap: wrap;
            }

            .filter-select,
            .search-input {
                width: calc(50% - 4px);
                min-width: 140px;
            }

            .search-button {
                flex: 1;
                min-width: 84px;
            }

            .card-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 520px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

                typeKey: 'tool',
                badge: '🟠',
                strong: false,
                robot: false
            }
        ];

        const templates = {
            qa: [
                { name: '文档问答模板', intro: '基于知识库检索提供运维文档问答，适合 SOP 与 FAQ 场景。', icon: '知' },
                { name: '告警处理指引', intro: '结合告警内容、知识库和标准流程，生成排障建议。', icon: '告' },
                { name: '新人带教助手', intro: '围绕培训资料与制度文档，帮助新同学快速上手值班工作。', icon: '教' }
            ],
            tool: [
                { name: '主机运维代理', intro: '连接主机、日志与工单类工具，实现自动巡检和基础处置。', icon: '主' },
                { name: '发布编排模板', intro: '通过一组标准工具实现发布前检查、执行与回滚建议。', icon: '发' },
                { name: '资源巡检模板', intro: '串联云资源与监控能力，快速搭建资源巡检类智能体。', icon: '巡' }
            ]
        };

        const state = {
            keyword: '',
            selectedType: 'all',
            openMenuId: null,
            templateModalOpen: false,
            activeTemplateTab: 'qa'
        };

        const cardGrid = document.getElementById('cardGrid');
        const emptyState = document.getElementById('emptyState');
        const typeSelect = document.getElementById('typeSelect');
        const templateModal = document.getElementById('templateModal');
        const templateTabs = document.getElementById('templateTabs');
        const templateGrid = document.getElementById('templateGrid');
        const toastWrap = document.getElementById('toastWrap');

        typeSelect.innerHTML = skillTypeOptions
            .map((item) => `<option value="${item.value}">${item.label}</option>`)
            .join('');

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toastWrap.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.2s ease';
                setTimeout(() => toast.remove(), 200);
            }, 2200);
        }

        function getFilteredSkills() {
            const keyword = state.keyword.trim().toLowerCase();
            return skills.filter((item) => {
                const matchesKeyword = !keyword || item.name.toLowerCase().includes(keyword) || item.introduction.toLowerCase().includes(keyword);
                const matchesType = state.selectedType === 'all' || item.typeKey === state.selectedType;
                return matchesKeyword && matchesType;
            });
        }

        function renderCard(item) {
            const dropdownOpen = state.openMenuId === item.id ? 'open' : '';
            return `
                <article class="skill-card" data-action="open-card" data-id="${item.id}">
                    <div class="card-banner ${item.strong ? 'banner-strong' : ''}">
                        <button class="pin-btn ${item.pinned ? 'active' : ''}" type="button" data-action="toggle-pin" data-id="${item.id}">📌</button>
                        <div class="menu-wrap">
                            <button class="menu-btn" type="button" data-action="toggle-menu" data-id="${item.id}">⋮</button>
                            <div class="dropdown ${dropdownOpen}">
                                <button type="button" data-action="edit" data-id="${item.id}">编辑</button>
                                <button type="button" class="danger" data-action="delete" data-id="${item.id}">删除</button>
                            </div>
                        </div>
                    </div>
                    <div class="avatar-badge ${item.robot ? 'robot' : ''}">${item.badge}</div>
                    <div class="card-body">
                        <h3 class="card-title">${item.name}</h3>
                        <p class="card-desc">${item.introduction}</p>
                        <div class="tag-row">
                            <span class="tag tag-model">${item.modelName}</span>
                            <span class="tag tag-skill">${item.skillType}</span>
                        </div>
                        <div class="card-footer">分组: ${item.group} | 所有者: ${item.owner}</div>
                    </div>
                </article>
            `;
        }

        function renderTemplateModal() {
            templateModal.className = `modal-mask ${state.templateModalOpen ? 'open' : ''}`;
            templateTabs.innerHTML = `
                <button class="template-tab ${state.activeTemplateTab === 'qa' ? 'active' : ''}" data-action="switch-template-tab" data-tab="qa" type="button">知识问答智能体(RAG)</button>
                <button class="template-tab ${state.activeTemplateTab === 'tool' ? 'active' : ''}" data-action="switch-template-tab" data-tab="tool" type="button">基础工具智能体(ReAct Agent)</button>
            `;

            templateGrid.innerHTML = templates[state.activeTemplateTab].map((item) => `
                <article class="template-card">
                    <div class="template-icon">${item.icon}</div>
                    <strong>${item.name}</strong>
                    <p>${item.intro}</p>
                    <button class="primary-button" type="button" data-action="use-template" data-template-name="${item.name}">使用该模板</button>
                </article>
            `).join('');
        }

        function render() {
            const data = getFilteredSkills();
            cardGrid.innerHTML = `
                <article class="create-card">
                    <div class="create-action" id="createBlank">
                        <div class="create-icon">✚</div>
                        <div>创建空白智能体</div>
                    </div>
                    <div class="create-action" id="createFromTemplate">
                        <div class="create-icon">⧉</div>
                        <div>从模板创建</div>
                    </div>
                </article>
            ` + data.map(renderCard).join('');

            emptyState.style.display = data.length === 0 ? 'flex' : 'none';
            cardGrid.style.display = data.length === 0 ? 'none' : 'grid';
            renderTemplateModal();
        }

        document.addEventListener('click', (event) => {
            const target = event.target.closest('[data-action], [data-toast], #createBlank, #createFromTemplate');
            const clickedMenu = event.target.closest('.dropdown');
            const clickedMenuButton = event.target.closest('[data-action="toggle-menu"]');
            const clickedTemplateModal = event.target.closest('.modal');

            if (!clickedMenu && !clickedMenuButton && state.openMenuId !== null) {
                state.openMenuId = null;
                render();
            }

            if (state.templateModalOpen && !clickedTemplateModal && event.target === templateModal) {
                state.templateModalOpen = false;
                renderTemplateModal();
            }

            if (!target) return;

            if (target.dataset.toast) {
                showToast(target.dataset.toast);
                return;
            }

            if (target.id === 'createBlank') {
                showToast('当前原型先展示主列表页，创建空白智能体弹窗未展开。');
                return;
            }

            if (target.id === 'createFromTemplate') {
                state.templateModalOpen = true;
                state.activeTemplateTab = 'qa';
                renderTemplateModal();
                return;
            }

            const action = target.dataset.action;
            const id = target.dataset.id;
            const skill = skills.find((item) => item.id === id);

            if (action === 'toggle-menu') {
                event.stopPropagation();
                state.openMenuId = state.openMenuId === id ? null : id;
                render();
                return;
            }

            if (action === 'toggle-pin') {
                event.stopPropagation();
                if (skill) {
                    skill.pinned = !skill.pinned;
                    showToast(skill.pinned ? '已置顶该智能体' : '已取消置顶');
                    render();
                }
                return;
            }

            if (action === 'edit') {
                event.stopPropagation();
                showToast('原型未展开编辑智能体弹窗。');
                state.openMenuId = null;
                render();
                return;
            }

            if (action === 'delete') {
                event.stopPropagation();
                showToast('这里仅模拟删除入口，不执行真实删除。');
                state.openMenuId = null;
                render();
                return;
            }

            if (action === 'open-card') {
                if (skill) {
                    sessionStorage.setItem('selectedSkill', JSON.stringify(skill));
                    window.location.href = './智能体详情.html';
                }
                return;
            }

            if (action === 'switch-template-tab') {
                state.activeTemplateTab = target.dataset.tab;
                renderTemplateModal();
                return;
            }

            if (action === 'use-template') {
                showToast(`已选择模板：${target.dataset.templateName}`);
                state.templateModalOpen = false;
                renderTemplateModal();
                return;
            }
        });

        typeSelect.addEventListener('change', (event) => {
            state.selectedType = event.target.value;
            render();
        });

        document.getElementById('searchInput').addEventListener('input', (event) => {
            state.keyword = event.target.value;
            render();
        });

        document.getElementById('searchButton').addEventListener('click', () => {
            render();
        });

        document.getElementById('closeTemplateModal').addEventListener('click', () => {
            state.templateModalOpen = false;
            renderTemplateModal();
        });

        render();
    </script>
