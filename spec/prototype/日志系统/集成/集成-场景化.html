<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueKing Lite - 日志集成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f6f8fb 0%, #f0f2f7 100%);
            color: #1f2329;
        }

        .top-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            height: 60px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.3px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 50%, #699eff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(58, 132, 255, 0.25);
        }

        .header-nav {
            display: flex;
            gap: 8px;
            margin-left: 48px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #646a73;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .nav-item:hover {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.06);
        }

        .nav-item.active {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.1);
        }

        .nav-icon {
            font-size: 16px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #646a73;
            font-size: 14px;
        }

        .header-right > span {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .header-right > span:hover {
            background: rgba(0, 0, 0, 0.04);
            color: #0052d9;
        }

        .sub-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            height: 52px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            padding: 0 32px;
        }

        .sub-nav {
            display: flex;
            gap: 4px;
        }

        .sub-nav-item {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #646a73;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .sub-nav-item:hover {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.06);
        }

        .sub-nav-item.active {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.12);
        }

        .main-container {
            display: flex;
            height: calc(100vh - 112px);
            gap: 20px;
            padding: 20px;
        }

        .left-sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .search-box {
            padding: 16px;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8f959e;
            font-size: 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 42px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.02);
        }

        .search-input:hover {
            border-color: rgba(0, 82, 217, 0.3);
            background: #fff;
        }

        .search-input:focus {
            border-color: #0052d9;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.08);
        }

        .tree-menu {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 16px;
        }

        .tree-node {
            user-select: none;
            margin-bottom: 4px;
        }

        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tree-node-content:hover {
            background: rgba(0, 82, 217, 0.06);
        }

        .tree-node-content.active {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.12) 0%, rgba(58, 132, 255, 0.08) 100%);
            color: #0052d9;
            box-shadow: 0 2px 8px rgba(0, 82, 217, 0.12);
        }

        .tree-node-icon {
            width: 20px;
            margin-right: 8px;
            color: #8f959e;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 12px;
        }

        .tree-node-icon.expanded {
            transform: rotate(90deg);
            color: #0052d9;
        }

        .tree-node-label {
            flex: 1;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-weight: 500;
        }

        .tree-label-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 8px;
        }

        .tree-count {
            color: #8f959e;
            font-size: 12px;
            font-weight: 600;
        }

        .tree-children {
            display: none;
            padding-left: 28px;
            margin-top: 4px;
        }

        .tree-children.expanded {
            display: block;
        }

        .all-items {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 0 0 10px 0;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .all-items {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.08) 0%, rgba(58, 132, 255, 0.05) 100%);
        }

        .all-items:hover {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.15) 0%, rgba(58, 132, 255, 0.08) 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.15);
        }

        .all-items.active {
            box-shadow: 0 0 0 2px rgba(0, 82, 217, 0.18) inset;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 4px;
        }

        .category-item:hover {
            background: rgba(0, 82, 217, 0.06);
        }

        .category-item.active {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.12) 0%, rgba(58, 132, 255, 0.08) 100%);
            color: #0052d9;
        }

        .category-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .category-label {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .category-count {
            color: #8f959e;
            font-size: 12px;
            font-weight: 600;
        }


        .all-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .all-icon {
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 100%);
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.3);
        }

        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .integration-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            min-height: 250px;
        }

        .integration-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 82, 217, 0.12);
            border-color: rgba(0, 82, 217, 0.2);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            background: rgba(0, 82, 217, 0.08);
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f2329;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-subtitle {
            font-size: 13px;
            color: #8f959e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .probe-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(0, 82, 217, 0.08);
            color: #0052d9;
        }


        .card-description {
            font-size: 14px;
            color: #646a73;
            line-height: 1.6;
            flex: 1;
        }

        .btn-integrate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .btn-integrate:hover {
            background: linear-gradient(135deg, #0041b8 0%, #2968d9 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.3);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #8f959e;
            font-size: 14px;
        }

        .tree-menu::-webkit-scrollbar,
        .content-area::-webkit-scrollbar {
            width: 8px;
        }

        .tree-menu::-webkit-scrollbar-track,
        .content-area::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 0;
        }

        .tree-menu::-webkit-scrollbar-thumb,
        .content-area::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .tree-menu::-webkit-scrollbar-thumb:hover,
        .content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
            background-clip: content-box;
        }

        @media (max-width: 1024px) {
            .header-nav {
                gap: 4px;
                margin-left: 24px;
            }

            .nav-item {
                padding: 6px 12px;
                font-size: 13px;
            }

            .left-sidebar {
                width: 280px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1d23 0%, #0f1115 100%);
                color: #e8eaed;
            }

            .top-header,
            .sub-header {
                background: rgba(30, 33, 39, 0.95);
                border-bottom-color: rgba(255, 255, 255, 0.08);
            }

            .left-sidebar,
            .content-area {
                background: rgba(30, 33, 39, 0.9);
                border-color: rgba(255, 255, 255, 0.08);
            }

            .search-input {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(255, 255, 255, 0.1);
                color: #e8eaed;
            }

            .search-input:hover {
                border-color: rgba(58, 132, 255, 0.5);
                background: rgba(255, 255, 255, 0.08);
            }

            .search-input:focus {
                border-color: #3a84ff;
                background: rgba(255, 255, 255, 0.1);
            }

            .integration-card {
                background: rgba(40, 44, 52, 0.95);
                border-color: rgba(255, 255, 255, 0.08);
            }

            .card-title { color: #f0f3f7; }
            .card-description,
            .tree-count,
            .card-subtitle { color: #a4acb8; }

        }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">BK</div>
                <span>BlueKing Lite</span>
            </div>
            <nav class="header-nav">
                <div class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>日志搜索</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>日志分析</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📅</span>
                    <span>事件</span>
                </div>
                <div class="nav-item active">
                    <span class="nav-icon">🔌</span>
                    <span>集成</span>
                </div>
            </nav>
        </div>
        <div class="header-right">
            <span>👤 首页文档</span>
            <span>🌐 语言: 简体中文</span>
        </div>
    </div>

    <div class="sub-header">
        <nav class="sub-nav">
            <div class="sub-nav-item active">日志集成</div>
            <div class="sub-nav-item">日志接收</div>
            <div class="sub-nav-item">日志分组</div>
        </nav>
    </div>

    <div class="main-container">
        <div class="left-sidebar">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input id="searchInput" type="text" class="search-input" placeholder="搜索场景...">
                </div>
            </div>

            <div class="tree-menu" id="treeMenu">
                <div class="all-items active" data-filter-type="all" data-filter-value="all">
                    <div class="all-icon">📊</div>
                    <div class="tree-node-label">
                        <span class="tree-label-text">全部</span>
                        <span class="tree-count">(18)</span>
                    </div>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="通用">
                    <span class="category-icon">📥</span>
                    <span class="category-label">通用</span>
                    <span class="category-count">(3)</span>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="数据库">
                    <span class="category-icon">🗄️</span>
                    <span class="category-label">数据库</span>
                    <span class="category-count">(5)</span>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="中间件">
                    <span class="category-icon">⚙️</span>
                    <span class="category-label">中间件</span>
                    <span class="category-count">(4)</span>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="网络">
                    <span class="category-icon">🌍</span>
                    <span class="category-label">网络</span>
                    <span class="category-count">(2)</span>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="容器">
                    <span class="category-icon">📦</span>
                    <span class="category-label">容器</span>
                    <span class="category-count">(1)</span>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="K8s">
                    <span class="category-icon">☸️</span>
                    <span class="category-label">K8s</span>
                    <span class="category-count">(1)</span>
                </div>

                <div class="category-item" data-filter-type="category" data-filter-value="安全与审计">
                    <span class="category-icon">🔒</span>
                    <span class="category-label">安全与审计</span>
                    <span class="category-count">(2)</span>
                </div>

            </div>
        </div>

        <div class="content-area">
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <script>
        const scenes = [
            // 通用
            { name: '日志文件', icon: '📄', probe: 'Vector', category: '通用', desc: '通用文件日志采集，支持多种日志格式和自动轮转检测' },
            { name: 'Syslog 接收', icon: '📋', probe: 'Vector', category: '通用', desc: '接收 Syslog 协议日志，支持 RFC3164 和 RFC5424 格式，TCP/UDP 传输' },
            { name: 'SNMP Trap', icon: '📟', probe: 'Vector', category: '通用', desc: '接收 SNMP Trap 消息，获取网络设备、服务器、存储等发送的异常事件通知' },
            // 数据库
            { name: 'MySQL', icon: '🐬', probe: 'Filebeat', category: '数据库', desc: '采集并解析 MySQL 错误日志和慢查询日志，提取执行时间、锁定时间等关键字段' },
            { name: 'PostgreSQL', icon: '🐘', probe: 'Filebeat', category: '数据库', desc: '采集并解析 PostgreSQL 服务日志，结构化提取日志级别、进程ID等字段' },
            { name: 'MongoDB', icon: '🍃', probe: 'Filebeat', category: '数据库', desc: '采集并解析 MongoDB 日志，结构化提取时间戳、严重级别、组件等字段' },
            { name: 'Redis', icon: '🔴', probe: 'Filebeat', category: '数据库', desc: '采集并解析 Redis 服务日志和慢日志，提取日志级别、角色、PID等字段' },
            { name: 'Elasticsearch', icon: '🔍', probe: 'Filebeat', category: '数据库', desc: '采集并解析 ES 服务日志、慢日志和GC日志，结构化提取关键字段' },
            // 中间件
            { name: 'Nginx', icon: '🌐', probe: 'Filebeat', category: '中间件', desc: '采集并解析 Nginx 访问日志和错误日志，提取请求方法、状态码、响应时间等字段' },
            { name: 'Apache', icon: '🪶', probe: 'Filebeat', category: '中间件', desc: '采集并解析 Apache 访问日志和错误日志，支持 combined/common 格式' },
            { name: 'Kafka', icon: '📨', probe: 'Filebeat', category: '中间件', desc: '采集并解析 Kafka 服务日志，结构化提取日志级别、类名、消息等字段' },
            { name: 'RabbitMQ', icon: '🐰', probe: 'Filebeat', category: '中间件', desc: '采集并解析 RabbitMQ 日志，结构化提取时间戳、日志级别、消息等字段' },
            // 网络
            { name: 'HTTP 流量分析', icon: '🌍', probe: 'Packetbeat', category: '网络', desc: '抓取 HTTP 网络流量，解析请求/响应内容、状态码和耗时' },
            { name: '网络流', icon: '📈', probe: 'Packetbeat', category: '网络', desc: '捕获网络会话数据，记录源/目标IP、端口、字节数等连接信息' },
            // 容器
            { name: 'Docker 容器日志', icon: '🐳', probe: 'Vector', category: '容器', desc: '采集 Docker 容器日志，自动识别容器名称、镜像ID等元数据' },
            // K8s
            { name: 'K8s日志', icon: '☸️', probe: 'Vector', category: 'K8s', desc: '通过 DaemonSet 方式采集 K8s 节点与容器日志，自动关联命名空间、Pod、容器等元数据' },
            // 安全与审计
            { name: 'Windows 事件日志', icon: '🪟', probe: 'Winlogbeat', category: '安全与审计', desc: '采集 Windows 事件日志，包含系统事件（硬件、驱动、服务）和安全事件（登录、授权）' },
            { name: 'Linux 文件变更监控', icon: '🛡️', probe: 'Auditbeat', category: '安全与审计', desc: '监控指定文件和目录的变更，检测未授权修改，保护关键配置文件完整性' },
        ];

        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');

        let activeFilter = { type: 'all', value: 'all' };
        let keyword = '';

        function probeClass(probe) {
            return `probe-${probe.toLowerCase()}`;
        }

        function createCard(scene) {
            const card = document.createElement('div');
            card.className = 'integration-card';
            card.dataset.name = scene.name;
            card.dataset.category = scene.category;
            card.dataset.probe = scene.probe;
            card.dataset.desc = scene.desc;

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">${scene.icon}</div>
                    <div class="card-info">
                        <div class="card-title-row">
                            <div class="card-title">${scene.name}</div>
                        </div>
                        <div class="card-subtitle">
                            <span class="category-badge">${scene.category}</span>
                        </div>
                    </div>
                </div>
                <div class="card-description">${scene.desc}</div>
                <button class="btn-integrate" onclick="handleIntegrate('${scene.name}', '${scene.probe}')">+ 接入</button>
            `;

            return card;
        }

        // 处理接入按钮点击
        function handleIntegrate(name, probe) {
            // 通用类型
            if (name === '日志文件' && probe === 'Vector') {
                window.location.href = '集成页面/日志文件 (Vector).html';
                return;
            }
            if (name === 'Syslog 接收' && probe === 'Vector') {
                window.location.href = '集成页面/Syslog 接收 (Vector).html';
                return;
            }
            if (name === 'SNMP Trap' && probe === 'Vector') {
                window.location.href = '集成页面/SNMP Trap (Vector).html';
                return;
            }
            // 数据库类型
            if (name === 'MySQL' && probe === 'Filebeat') {
                window.location.href = '集成页面/MySQL (Filebeat).html';
                return;
            }
            if (name === 'PostgreSQL' && probe === 'Filebeat') {
                window.location.href = '集成页面/PostgreSQL (Filebeat).html';
                return;
            }
            if (name === 'MongoDB' && probe === 'Filebeat') {
                window.location.href = '集成页面/MongoDB (Filebeat).html';
                return;
            }
            if (name === 'Redis' && probe === 'Filebeat') {
                window.location.href = '集成页面/Redis (Filebeat).html';
                return;
            }
            if (name === 'Elasticsearch' && probe === 'Filebeat') {
                window.location.href = '集成页面/Elasticsearch (Filebeat).html';
                return;
            }
            // 中间件类型
            if (name === 'Nginx' && probe === 'Filebeat') {
                window.location.href = '集成页面/Nginx (Filebeat).html';
                return;
            }
            if (name === 'Apache' && probe === 'Filebeat') {
                window.location.href = '集成页面/Apache (Filebeat).html';
                return;
            }
            if (name === 'Kafka' && probe === 'Filebeat') {
                window.location.href = '集成页面/Kafka (Filebeat).html';
                return;
            }
            if (name === 'RabbitMQ' && probe === 'Filebeat') {
                window.location.href = '集成页面/RabbitMQ (Filebeat).html';
                return;
            }
            // 网络类型
            if (name === 'HTTP 流量分析' && probe === 'Packetbeat') {
                window.location.href = '集成页面/HTTP 流量分析 (Packetbeat).html';
                return;
            }
            if (name === '网络流' && probe === 'Packetbeat') {
                window.location.href = '集成页面/网络流 (Packetbeat).html';
                return;
            }
            // 容器
            if (name === 'Docker 容器日志' && probe === 'Vector') {
                window.location.href = '集成页面/Docker 容器日志 (Vector).html';
                return;
            }
            if (name === 'K8s日志' && probe === 'Vector') {
                window.location.href = '集成页面/K8s 集群日志 (Vector).html';
                return;
            }
            // 安全与审计类型
            if (name === 'Windows 事件日志' && probe === 'Winlogbeat') {
                window.location.href = '集成页面/Windows 事件日志 (Winlogbeat).html';
                return;
            }
            if (name === 'Linux 文件变更监控' && probe === 'Auditbeat') {
                window.location.href = '集成页面/Linux 文件变更监控 (Auditbeat).html';
                return;
            }
            // 其他场景暂时显示提示
            alert(`${name} (${probe}) 配置页面开发中...`);

        }

        function matchFilter(scene) {
            if (activeFilter.type === 'all') return true;
            if (activeFilter.type === 'category') return scene.category === activeFilter.value;
            if (activeFilter.type === 'scene') return scene.name === activeFilter.value;
            return true;
        }

        function matchKeyword(scene, kw) {
            if (!kw) return true;
            const fullText = `${scene.name} ${scene.desc} ${scene.category} ${scene.probe}`.toLowerCase();
            return fullText.includes(kw);
        }

        function renderCards() {
            cardsGrid.innerHTML = '';
            const visible = scenes.filter(scene => matchFilter(scene) && matchKeyword(scene, keyword));

            if (!visible.length) {
                cardsGrid.innerHTML = '<div class="empty-state">未找到匹配场景</div>';
                return;
            }

            visible.forEach(scene => cardsGrid.appendChild(createCard(scene)));
        }

        function setActiveMenu(target) {
            document.querySelectorAll('.all-items, .category-item').forEach(item => item.classList.remove('active'));
            target.classList.add('active');
        }


        function bindMenuEvents() {
            document.querySelectorAll('.all-items').forEach(item => {
                item.addEventListener('click', () => {
                    activeFilter = { type: item.dataset.filterType, value: item.dataset.filterValue };
                    setActiveMenu(item);
                    renderCards();
                });
            });

            document.querySelectorAll('.category-item').forEach(item => {
                item.addEventListener('click', () => {
                    activeFilter = { type: item.dataset.filterType, value: item.dataset.filterValue };
                    setActiveMenu(item);
                    renderCards();
                });
            });
        }

        function filterMenu(searchValue) {
            const query = searchValue.trim().toLowerCase();
            document.querySelectorAll('.category-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(query) || !query ? '' : 'none';
            });
            const allItem = document.querySelector('.all-items');
            allItem.style.display = !query ? '' : 'none';
        }

        window.addEventListener('DOMContentLoaded', () => {

            document.querySelectorAll('.sub-nav-item').forEach(item => {
                item.addEventListener('click', function () {
                    document.querySelectorAll('.sub-nav-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            bindMenuEvents();
            renderCards();

            searchInput.addEventListener('input', (e) => {
                keyword = e.target.value.trim().toLowerCase();
                filterMenu(e.target.value);
                renderCards();
            });
        });
    </script>
</body>
</html>
